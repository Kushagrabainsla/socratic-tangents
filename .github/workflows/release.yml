name: Release

# Cut a release by pushing a version tag:
#   npm version patch && git push --follow-tags
# This builds, creates a GitHub Release with the zips, and submits to every store whose secrets
# are configured. Stores without secrets are skipped automatically, so this works from day one.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Surfaced at job level so step `if:` can detect which stores are configured
    # (the `secrets` context isn't available in `if`, but `env` is).
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run zip
      - run: npm run zip:firefox

      - name: Publish GitHub Release with build artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
          generate_release_notes: true

      - name: Resolve version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Submit to Chrome Web Store
        if: env.CHROME_EXTENSION_ID != ''
        run: |
          npx wxt submit \
            --chrome-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-chrome.zip" \
            --chrome-extension-id "$CHROME_EXTENSION_ID" \
            --chrome-client-id "$CHROME_CLIENT_ID" \
            --chrome-client-secret "$CHROME_CLIENT_SECRET" \
            --chrome-refresh-token "$CHROME_REFRESH_TOKEN"
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Edge Add-ons
        if: env.EDGE_PRODUCT_ID != ''
        run: |
          npx wxt submit \
            --edge-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-chrome.zip" \
            --edge-product-id "$EDGE_PRODUCT_ID" \
            --edge-client-id "$EDGE_CLIENT_ID" \
            --edge-api-key "$EDGE_API_KEY"
        env:
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

      - name: Submit to Firefox Add-ons
        if: env.FIREFOX_EXTENSION_ID != ''
        run: |
          npx wxt submit \
            --firefox-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-firefox.zip" \
            --firefox-sources-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-sources.zip" \
            --firefox-extension-id "$FIREFOX_EXTENSION_ID" \
            --firefox-jwt-issuer "$FIREFOX_JWT_ISSUER" \
            --firefox-jwt-secret "$FIREFOX_JWT_SECRET"
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
