name: Release

# Every push to main ships a release: build, create a GitHub Release with the zips, and submit to
# every store whose secrets are configured. Stores without secrets are skipped automatically.
#
# Versioning: package.json holds only the major.minor you control by hand. The published patch is
# the workflow run number, computed here at build time and never committed. So releases are always
# monotonically increasing AND main is never written back to (no bot commit, nothing to pull).
on:
  push:
    branches: [main]

permissions:
  contents: write

# Never run two releases at once; a queued push waits for the in-flight one to finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip a release for commits you don't want to ship (e.g. docs-only).
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    # Surfaced at job level so step `if:` can detect which stores are configured
    # (the `secrets` context isn't available in `if`, but `env` is).
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile

      - name: Resolve release version
        id: meta
        # major.minor from package.json + run number as patch. Computed only on the runner; never
        # committed, so main stays untouched. run_number only ever increases, so versions are monotonic.
        run: |
          base=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          version="${base}.${{ github.run_number }}"
          npm version "$version" --no-git-tag-version --allow-same-version
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: npm run zip
      - run: npm run zip:firefox

      - name: Publish GitHub Release with build artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          files: .output/*.zip
          generate_release_notes: true

      - name: Submit to Chrome Web Store
        if: env.CHROME_EXTENSION_ID != ''
        run: |
          npx wxt submit \
            --chrome-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-chrome.zip" \
            --chrome-extension-id "$CHROME_EXTENSION_ID" \
            --chrome-client-id "$CHROME_CLIENT_ID" \
            --chrome-client-secret "$CHROME_CLIENT_SECRET" \
            --chrome-refresh-token "$CHROME_REFRESH_TOKEN"
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Edge Add-ons
        if: env.EDGE_PRODUCT_ID != ''
        run: |
          npx wxt submit \
            --edge-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-chrome.zip" \
            --edge-product-id "$EDGE_PRODUCT_ID" \
            --edge-client-id "$EDGE_CLIENT_ID" \
            --edge-api-key "$EDGE_API_KEY"
        env:
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

      - name: Submit to Firefox Add-ons
        if: env.FIREFOX_EXTENSION_ID != ''
        run: |
          npx wxt submit \
            --firefox-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-firefox.zip" \
            --firefox-sources-zip ".output/socratic-tangents-${{ steps.meta.outputs.version }}-sources.zip" \
            --firefox-extension-id "$FIREFOX_EXTENSION_ID" \
            --firefox-jwt-issuer "$FIREFOX_JWT_ISSUER" \
            --firefox-jwt-secret "$FIREFOX_JWT_SECRET"
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
