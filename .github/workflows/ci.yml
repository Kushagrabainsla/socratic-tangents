name: CI

# Pull requests only. Pushes to main are handled by release.yml, which builds and ships.
on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run compile
      - run: npm run test:run
      - run: npm run build
      - run: npm run build:firefox
